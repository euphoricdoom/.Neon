name: .NeoN Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          if find tests -name "test_*.py" -quit 2>/dev/null | grep -q .; then
            python -m pytest -q
          else
            echo "No test files found — running repo structure smoke check"
            test -f README.md
            test -d docs
            test -d schemas
            test -d validators
            test -d tests
            echo "Repo structure smoke check passed."
          fi
